{% extends 'base.html' %}

{% block title %}Login - Antigravity Bookstore{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 4rem auto;">
    <div class="card">
        <h2 style="margin-bottom: 2rem; text-align: center;">Login to your account</h2>
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required placeholder="Enter your email">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="Enter your password">
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
        </form>
        <p style="margin-top: 1.5rem; text-align: center; color: var(--text-muted);">
            Don't have an account? <a href="/users/register/" style="color: var(--primary);">Register here</a>
        </p>
    </div>
</div>
{% endblock %}
